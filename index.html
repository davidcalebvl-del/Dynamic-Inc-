<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseNet - Coming Soon</title>
    <meta name="description" content="PulseNet - A premium social network built around you. A Dynamic Inc. project.">
    <meta name="theme-color" content="#0A0A0F">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0A0A0F;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 2rem;
            background: conic-gradient(from 0deg, #60a5fa, #34d399, #a78bfa, #60a5fa);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: spin 3s linear infinite;
        }
        .logo::before {
            content: '';
            width: 40px;
            height: 40px;
            background: #0A0A0F;
            border-radius: 50%;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        p { color: #a0a0a0; font-size: 1.1rem; line-height: 1.6; max-width: 500px; }
        .status {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        a { color: #60a5fa; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="logo"></div>
    <h1>PulseNet</h1>
    <p>A premium social network built around you and the people who matter most.</p>
    <div class="status">
        <p><strong>Deployment Status:</strong> Workflow triggered, building now...</p>
        <p style="margin-top: 1rem;">
            <a href="https://github.com/davidcalebvl-del/Dynamic-Inc-/actions">🔗 View on GitHub</a>
        </p>
    </div>
</body>
</html>
